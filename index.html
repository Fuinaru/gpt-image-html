<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPT Image 工具</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e6e8ec;
    --muted: #8b919e;
    --accent: #6c8cff;
    --accent-2: #5a76e0;
    --danger: #ff6b6b;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }
  header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  h1 { font-size: 20px; margin: 0; font-weight: 600; }
  .sub { color: var(--muted); font-size: 13px; margin-top: 2px; }

  .key-row { display: flex; gap: 8px; align-items: center; }
  input, textarea, select {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 9px 11px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  input::placeholder, textarea::placeholder { color: #5b6172; }

  .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .panel h2 { font-size: 14px; margin: 0 0 14px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }

  .tabs { display: inline-flex; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 3px; margin-bottom: 16px; }
  .tab { padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; color: var(--muted); border: none; background: transparent; }
  .tab.active { background: var(--accent); color: #fff; }

  label.field { display: block; margin-bottom: 14px; }
  label.field > span { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  textarea { width: 100%; resize: vertical; min-height: 90px; }
  input[type=text], input[type=password] { width: 100%; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .drop {
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    padding: 22px;
    text-align: center;
    color: var(--muted);
    cursor: pointer;
    transition: border-color .15s, background .15s;
    font-size: 13px;
  }
  .drop.dragover { border-color: var(--accent); background: rgba(108,140,255,.08); }
  .thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .thumb { position: relative; width: 72px; height: 72px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .thumb button { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; border-radius: 50%; border: none; background: rgba(0,0,0,.6); color: #fff; cursor: pointer; font-size: 12px; line-height: 1; padding: 0; }

  button.btn {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 11px 18px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%;
    transition: background .15s;
  }
  button.btn:hover { background: var(--accent-2); }
  button.btn:disabled { opacity: .5; cursor: not-allowed; }
  button.ghost { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); width: auto; padding: 9px 14px; }
  button.danger { background: var(--danger); border-color: var(--danger); color: #fff; animation: pulse 1.4s ease-in-out infinite; }
  button.danger:hover { background: #e85555; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,107,107,.5); } 50% { box-shadow: 0 0 0 6px rgba(255,107,107,0); } }

  .result { min-height: 260px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
  .result .placeholder { color: var(--muted); font-size: 14px; }
  .out-grid { display: grid; grid-template-columns: 1fr; gap: 14px; width: 100%; }
  .out-item { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--panel-2); }
  .out-item img { width: 100%; display: block; }
  .out-actions { display: flex; gap: 8px; padding: 10px; }
  .out-actions a { flex: 1; text-align: center; text-decoration: none; }

  .spinner { width: 34px; height: 34px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .err { color: var(--danger); font-size: 13px; background: rgba(255,107,107,.08); border: 1px solid rgba(255,107,107,.3); border-radius: 8px; padding: 10px 12px; white-space: pre-wrap; word-break: break-word; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .warn-bar { font-size: 12px; color: #d4a72c; background: rgba(212,167,44,.1); border: 1px solid rgba(212,167,44,.3); border-radius: 8px; padding: 8px 11px; margin-bottom: 16px; }

  /* 历史记录 */
  .history-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .history-head h2 { margin: 0; }
  .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .history-empty { color: var(--muted); font-size: 13px; padding: 20px 0; text-align: center; }
  .hist-item { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--panel-2); display: flex; flex-direction: column; }
  .hist-item .hist-img { width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer; display: block; background: #0c0e12; }
  .hist-meta { padding: 8px 10px; font-size: 12px; color: var(--muted); flex: 1; }
  .hist-meta .hist-mode { color: var(--accent); font-weight: 500; }
  .hist-badge { display: inline-block; margin-left: 6px; font-size: 10px; padding: 1px 7px; border-radius: 10px; vertical-align: middle; font-weight: 500; }
  .hist-badge.synced { color: #4ade80; background: rgba(74,222,128,.12); border: 1px solid rgba(74,222,128,.3); }
  .hist-badge.local  { color: #d4a72c; background: rgba(212,167,44,.12); border: 1px solid rgba(212,167,44,.3); }
  .hist-badge.folder { color: var(--accent); background: rgba(108,140,255,.12); border: 1px solid rgba(108,140,255,.3); }
  .hist-meta .hist-prompt { color: var(--text); margin-top: 3px; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .hist-meta .hist-time { margin-top: 4px; font-size: 11px; }
  .hist-actions { display: flex; gap: 6px; padding: 0 10px 10px; }
  .hist-actions button, .hist-actions a { flex: 1; font-size: 12px; padding: 6px 0; text-align: center; text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>GPT Image 工具</h1>
      <div class="sub">文生图 + 改图，调用 gpt-image</div>
    </div>
    <button class="btn ghost" id="toggleHistory">历史记录</button>
    <button class="btn ghost" id="toggleCfg">设置</button>
  </header>

  <div class="panel" id="cfgPanel" style="margin-bottom:20px; display:none">
    <h2>连接设置</h2>
    <div class="grid-2">
      <label class="field">
        <span>API 地址（base，到 /v1 为止）</span>
        <input type="text" id="apiBase" placeholder="https://your-proxy.com/v1">
      </label>
      <label class="field">
        <span>模型名</span>
        <input type="text" id="model" placeholder="gpt-image-2">
      </label>
    </div>
    <label class="field">
      <span>API Key</span>
      <input type="password" id="apiKey" placeholder="sk-...">
    </label>
    <div style="display:flex; gap:8px">
      <button class="btn ghost" id="saveCfg">保存</button>
      <span class="hint" id="cfgHint" style="align-self:center"></span>
    </div>
    <div class="hint">保存在本浏览器 localStorage，下次自动带出，可随时修改。</div>
  </div>

  <div class="warn-bar">
    本地单页工具：Key 和地址保存在本浏览器，请求从浏览器直接发往你填的地址。请勿部署到公网或分享本文件。
  </div>

  <div id="authBanner" style="display:none; align-items:center; justify-content:space-between; gap:12px; background:rgba(255,107,107,.1); border:1px solid rgba(255,107,107,.4); border-radius:8px; padding:12px 14px; margin-bottom:20px">
    <span id="authBannerText" style="color:var(--danger); font-size:13px"></span>
    <button class="btn danger" id="authBtn" style="width:auto; flex:none; white-space:nowrap">授权访问文件夹</button>
  </div>

  <div class="panel" id="historyPanel" style="margin-bottom:20px; display:none">
    <div class="history-head">
      <h2>历史记录</h2>
      <div style="display:flex; gap:8px">
        <button class="btn ghost" id="pickFolder">同步到文件夹</button>
        <button class="btn ghost" id="changeFolder">更换文件夹</button>
        <button class="btn ghost" id="clearHistory">清空历史</button>
      </div>
    </div>
    <div class="hint" id="folderStatus" style="margin-bottom:12px"></div>
    <div id="historyBody"></div>
  </div>

  <div class="layout">
    <!-- 左侧：输入 -->
    <div class="panel">
      <div class="tabs">
        <button class="tab active" data-mode="generate">文生图</button>
        <button class="tab" data-mode="edit">改图</button>
      </div>

      <!-- 改图：上传区 -->
      <div id="uploadBlock" style="display:none">
        <label class="field">
          <span>参考图片（改图模式，可多张；第一张为主图）</span>
          <div class="drop" id="drop">点击或拖拽图片到这里上传<br><span style="font-size:12px">支持 PNG / JPG / WEBP</span></div>
        </label>
        <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" multiple hidden>
        <div class="thumbs" id="thumbs"></div>
      </div>

      <label class="field">
        <span>提示词</span>
        <textarea id="prompt" placeholder="描述你想要的画面，例如：把这张照片变成赛博朋克风格，霓虹灯光，雨夜街道"></textarea>
      </label>

      <div class="grid-2">
        <label class="field">
          <span>尺寸</span>
          <select id="size">
            <option value="auto">auto（自动）</option>
            <option value="1024x1024" selected>1024 × 1024（1:1 方）</option>
            <option value="1536x1024">1536 × 1024（3:2 横）</option>
            <option value="1024x1536">1024 × 1536（2:3 竖）</option>
            <option value="1792x1024">1792 × 1024（16:9 横）</option>
            <option value="1024x1792">1024 × 1792（9:16 竖）</option>
            <option value="1344x768">1344 × 768（16:9 横）</option>
            <option value="768x1344">768 × 1344（9:16 竖）</option>
            <option value="1152x896">1152 × 896（4:3 横）</option>
            <option value="896x1152">896 × 1152（3:4 竖）</option>
            <option value="512x512">512 × 512（小方图）</option>
            <option value="256x256">256 × 256（小方图）</option>
            <option value="__custom__">自定义…</option>
          </select>
          <input type="text" id="sizeCustom" placeholder="宽x高，例如 1280x720" style="width:100%; margin-top:8px; display:none">
        </label>
        <label class="field">
          <span>质量</span>
          <select id="quality">
            <option value="high">high</option>
            <option value="medium" selected>medium</option>
            <option value="low">low</option>
            <option value="auto">auto</option>
          </select>
        </label>
      </div>

      <div class="grid-2">
        <label class="field">
          <span>生成数量</span>
          <select id="n">
            <option>1</option><option>2</option><option>3</option><option>4</option>
          </select>
        </label>
        <label class="field" id="bgField">
          <span>背景</span>
          <select id="background">
            <option value="auto">auto</option>
            <option value="transparent">透明</option>
            <option value="opaque">不透明</option>
          </select>
        </label>
      </div>

      <button class="btn" id="run">生成</button>
      <div class="hint">改图模式需至少上传一张图片。</div>
    </div>

    <!-- 右侧：结果 -->
    <div class="panel">
      <h2>结果</h2>
      <div class="result" id="result">
        <div class="placeholder">生成的图片会显示在这里</div>
      </div>
    </div>
  </div>
</div>

<script>
// ====== 默认配置（可在页面“设置”里覆盖，会存到 localStorage）======
const DEFAULT_KEY   = "";                          // 例如 "sk-xxxx"
const DEFAULT_BASE  = "";                          // 代理地址，例如 "https://your-proxy.com/v1"
const DEFAULT_MODEL = "gpt-image-2";               // 模型名
// =============================================================

const $ = id => document.getElementById(id);
let mode = 'generate';
let files = []; // {file, url}

// ---- IndexedDB 简易键值存储（比 file:// 下的 localStorage 更可靠）----
function idb() {
  return new Promise((resolve, reject) => {
    const r = indexedDB.open('gptimg', 1);
    r.onupgradeneeded = () => r.result.createObjectStore('kv');
    r.onsuccess = () => resolve(r.result);
    r.onerror = () => reject(r.error);
  });
}
async function idbSet(k, v) {
  const db = await idb();
  return new Promise((res, rej) => {
    const tx = db.transaction('kv', 'readwrite');
    tx.objectStore('kv').put(v, k);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}
async function idbGet(k) {
  const db = await idb();
  return new Promise((res, rej) => {
    const tx = db.transaction('kv', 'readonly');
    const q = tx.objectStore('kv').get(k);
    q.onsuccess = () => res(q.result); q.onerror = () => rej(q.error);
  });
}
async function idbDel(k) {
  const db = await idb();
  return new Promise((res, rej) => {
    const tx = db.transaction('kv', 'readwrite');
    tx.objectStore('kv').delete(k);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}

// ---- 配置：优先 IndexedDB，兼容旧的 localStorage，回退到默认 ----
const cfg = {
  key:   localStorage.getItem('gptimg_key')   ?? DEFAULT_KEY,
  base:  localStorage.getItem('gptimg_base')  ?? DEFAULT_BASE,
  model: localStorage.getItem('gptimg_model') ?? DEFAULT_MODEL,
};
$('apiKey').value  = cfg.key;
$('apiBase').value = cfg.base;
$('model').value   = cfg.model;

// 异步从 IndexedDB 恢复（若存在则覆盖上面的值）
(async () => {
  try {
    const saved = await idbGet('cfg');
    if (saved) {
      Object.assign(cfg, saved);
      $('apiKey').value  = cfg.key   ?? '';
      $('apiBase').value = cfg.base  ?? '';
      $('model').value   = cfg.model ?? DEFAULT_MODEL;
    }
  } catch {}
  // 有配置时收起设置面板，无配置时展开
  $('cfgPanel').style.display = (!cfg.key || !cfg.base) ? 'block' : 'none';
})();

$('toggleCfg').onclick = () => {
  const p = $('cfgPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
};
$('toggleHistory').onclick = () => {
  const p = $('historyPanel');
  const show = p.style.display === 'none';
  p.style.display = show ? 'block' : 'none';
  if (show) renderHistory();
};
$('saveCfg').onclick = async () => {
  cfg.key   = $('apiKey').value.trim();
  cfg.base  = $('apiBase').value.trim().replace(/\/+$/, '');
  cfg.model = $('model').value.trim() || DEFAULT_MODEL;
  // 主存 IndexedDB，同时写 localStorage 作兼容
  try { await idbSet('cfg', { key: cfg.key, base: cfg.base, model: cfg.model }); } catch {}
  try {
    localStorage.setItem('gptimg_key', cfg.key);
    localStorage.setItem('gptimg_base', cfg.base);
    localStorage.setItem('gptimg_model', cfg.model);
  } catch {}
  $('cfgHint').textContent = '已保存 ✓';
  setTimeout(() => $('cfgHint').textContent = '', 1500);
};

// 尺寸：选“自定义”时显示输入框
$('size').addEventListener('change', () => {
  $('sizeCustom').style.display = $('size').value === '__custom__' ? 'block' : 'none';
});

// ---- 模式切换 ----
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    mode = t.dataset.mode;
    $('uploadBlock').style.display = mode === 'edit' ? 'block' : 'none';
    $('run').textContent = mode === 'edit' ? '生成改图' : '生成';
  };
});

// ---- 上传交互 ----
const drop = $('drop'), fileInput = $('fileInput');
drop.onclick = () => fileInput.click();
fileInput.onchange = e => { addFiles(e.target.files); e.target.value = ''; };
['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('dragover'); }));
['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('dragover'); }));
drop.addEventListener('drop', e => addFiles(e.dataTransfer.files));

function addFiles(list) {
  for (const f of list) {
    if (!f.type.startsWith('image/')) continue;
    files.push({ file: f, url: URL.createObjectURL(f) });
  }
  renderThumbs();
}
function renderThumbs() {
  const box = $('thumbs');
  box.innerHTML = '';
  files.forEach((f, i) => {
    const d = document.createElement('div');
    d.className = 'thumb';
    d.innerHTML = `<img src="${f.url}"><button title="移除">×</button>`;
    d.querySelector('button').onclick = () => { files.splice(i, 1); renderThumbs(); };
    box.appendChild(d);
  });
}

// ---- 调用 API ----
$('run').onclick = run;
async function run() {
  if (!cfg.key)  { $('cfgPanel').style.display = 'block'; return showErr('请先在“设置”里填写 API Key'); }
  if (!cfg.base) { $('cfgPanel').style.display = 'block'; return showErr('请先在“设置”里填写 API 地址'); }
  const prompt = $('prompt').value.trim();
  if (!prompt) return showErr('请填写提示词');
  if (mode === 'edit' && files.length === 0) return showErr('改图模式请至少上传一张图片');

  setLoading(true);
  try {
    const data = mode === 'edit' ? await callEdit(prompt) : await callGenerate(prompt);
    renderResults(data);
    await saveHistory(data, prompt, mode);
  } catch (err) {
    showErr(err.message || String(err));
  } finally {
    setLoading(false);
  }
}

function commonParams() {
  const p = {
    model: cfg.model,
    size: getSize(),
    quality: $('quality').value,
    n: parseInt($('n').value, 10),
  };
  const bg = $('background').value;
  if (bg !== 'auto') p.background = bg;
  return p;
}

function getSize() {
  return $('size').value === '__custom__'
    ? ($('sizeCustom').value.trim() || '1024x1024')
    : $('size').value;
}

async function callGenerate(prompt) {
  const body = { ...commonParams(), prompt };
  const res = await fetch(cfg.base + '/images/generations', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + cfg.key, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return handleResponse(res);
}

async function callEdit(prompt) {
  const fd = new FormData();
  const p = commonParams();
  Object.entries(p).forEach(([k, v]) => fd.append(k, v));
  fd.append('prompt', prompt);
  files.forEach(f => fd.append('image[]', f.file, f.file.name));
  const res = await fetch(cfg.base + '/images/edits', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + cfg.key },
    body: fd,
  });
  return handleResponse(res);
}

async function handleResponse(res) {
  const json = await res.json();
  if (!res.ok) {
    const msg = json.error?.message || JSON.stringify(json);
    throw new Error(`API 错误 (${res.status})：${msg}`);
  }
  return json;
}

// ---- 渲染 ----
function setLoading(on) {
  $('run').disabled = on;
  if (on) {
    $('result').innerHTML = '<div class="spinner"></div><div class="placeholder">生成中，请稍候…</div>';
  }
}
function showErr(msg) {
  $('result').innerHTML = `<div class="err">${escapeHtml(msg)}</div>`;
}
function renderResults(json) {
  const items = json.data || [];
  if (!items.length) return showErr('未返回图片');
  const grid = document.createElement('div');
  grid.className = 'out-grid';
  items.forEach((it, i) => {
    const src = it.b64_json ? 'data:image/png;base64,' + it.b64_json : it.url;
    const el = document.createElement('div');
    el.className = 'out-item';
    el.innerHTML = `
      <img src="${src}">
      <div class="out-actions">
        <button class="btn ghost reuse">继续改这张</button>
        <a class="btn ghost" href="${src}" download="gpt-image-${Date.now()}-${i+1}.png">下载</a>
        <a class="btn ghost" href="${src}" target="_blank">新标签打开</a>
      </div>`;
    el.querySelector('.reuse').onclick = () => reuseImage(src);
    grid.appendChild(el);
  });
  const r = $('result');
  r.innerHTML = '';
  r.appendChild(grid);
}

// 把一张结果图作为参考图载入，切到改图模式
async function reuseImage(src) {
  let blob;
  if (src.startsWith('data:')) {
    blob = await (await fetch(src)).blob();
  } else {
    blob = await (await fetch(src)).blob();
  }
  const file = new File([blob], `reuse-${Date.now()}.png`, { type: blob.type || 'image/png' });
  files = [{ file, url: URL.createObjectURL(file) }];
  renderThumbs();
  // 切到改图 tab
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelector('.tab[data-mode="edit"]').classList.add('active');
  mode = 'edit';
  $('uploadBlock').style.display = 'block';
  $('run').textContent = '生成改图';
  $('prompt').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// ====== 历史记录 ======
// 主存储：IndexedDB（图片二进制 + 元数据，永不弹授权、不失效）
// 可选：额外同步一份 PNG 到用户选的本地文件夹（File System Access API）
const FS_SUPPORTED = 'showDirectoryPicker' in window;
const INDEX_FILE = 'index.json';
let dirHandle = null;        // 可选的同步文件夹句柄
let histUrls = [];           // 渲染时创建的 objectURL，重渲染前回收

async function ensurePermission(handle, request) {
  const opts = { mode: 'readwrite' };
  if ((await handle.queryPermission(opts)) === 'granted') return true;
  if (request && (await handle.requestPermission(opts)) === 'granted') return true;
  return false;
}

// 结果项 -> 图片二进制（base64 直接解码；url 则抓取，避免存会失效的地址）
async function itemToBlob(it) {
  if (it.b64_json) {
    const bin = atob(it.b64_json);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return new Blob([arr], { type: 'image/png' });
  }
  return await (await fetch(it.url)).blob();
}

// ---- IndexedDB 主存储 ----
async function loadIndex() {
  return (await idbGet('history')) || [];
}
async function saveIndex(list) {
  await idbSet('history', list);
}

// ---- 可选文件夹同步 ----
async function folderWrite(name, blob) {
  const fh = await dirHandle.getFileHandle(name, { create: true });
  const w = await fh.createWritable();
  await w.write(blob);
  await w.close();
}
async function folderWriteIndex(list) {
  const fh = await dirHandle.getFileHandle(INDEX_FILE, { create: true });
  const w = await fh.createWritable();
  await w.write(JSON.stringify(list.map(({id,file,prompt,mode,time}) => ({id,file,prompt,mode,time})), null, 2));
  await w.close();
}
async function folderReadIndex() {
  try {
    const fh = await dirHandle.getFileHandle(INDEX_FILE);
    return JSON.parse(await (await fh.getFile()).text()) || [];
  } catch { return []; }
}
async function folderReadBlob(file) {
  try {
    const fh = await dirHandle.getFileHandle(file);
    return await fh.getFile();
  } catch { return null; }
}

// 当前文件夹是否已授权可读写
async function folderReady() {
  return dirHandle && await ensurePermission(dirHandle, false);
}

async function saveHistory(json, prompt, mode) {
  const items = json.data || [];
  if (!items.length) return;
  const list = await loadIndex();
  const ts = Date.now();
  const syncFolder = await folderReady();
  // 文件夹已有索引（含仅文件夹的旧记录），新条目要合并进去而非覆盖
  const folderList = syncFolder ? await folderReadIndex() : null;
  const newEntries = [];
  for (let i = 0; i < items.length; i++) {
    const id = ts + '-' + i;
    const file = `gpt-image-${id}.png`;
    const blob = await itemToBlob(items[i]);
    await idbSet('img:' + id, blob);                    // 图片存进 IndexedDB
    const entry = { id, file, prompt, mode, time: ts };
    list.unshift(entry);
    newEntries.push(entry);
    if (syncFolder) { try { await folderWrite(file, blob); } catch {} } // 同时写文件夹
  }
  await saveIndex(list);
  if (syncFolder) {
    // 合并：文件夹原有记录 + 本次新增，按时间倒序写回，保留仅文件夹的旧历史
    const merged = [...newEntries, ...folderList].sort((a, b) => b.time - a.time);
    try { await folderWriteIndex(merged); } catch {}
  }
  if ($('historyPanel').style.display !== 'none') renderHistory();
}

function fmtTime(ts) {
  const d = new Date(ts);
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function setFolderStatus(msg) { $('folderStatus').textContent = msg || ''; }

// 文件夹未授权时显示醒目红色横幅；未选/已授权则隐藏
function showAuthBanner(name) {
  $('authBannerText').textContent = `同步文件夹「${name}」需要重新授权访问，授权前新图不会写入该文件夹。`;
  $('authBanner').style.display = 'flex';
}
function hideAuthBanner() {
  $('authBanner').style.display = 'none';
}

function revokeHistUrls() {
  histUrls.forEach(u => URL.revokeObjectURL(u));
  histUrls = [];
}

// 合并两种来源：IndexedDB 历史 + 文件夹 index.json，按 id 去重并打标签
// 标签：synced=两边都有；local=仅浏览器；folder=仅文件夹
async function mergedHistory() {
  const idbList = await loadIndex();
  const idbIds = new Set(idbList.map(x => x.id));
  let folderList = [], folderIds = new Set();
  if (await folderReady()) {
    folderList = await folderReadIndex();
    folderIds = new Set(folderList.map(x => x.id));
  }
  const map = new Map();
  for (const it of idbList) map.set(it.id, { ...it, src: 'idb' });
  for (const it of folderList) {
    if (map.has(it.id)) map.get(it.id).src = 'both';
    else map.set(it.id, { ...it, src: 'folder' });
  }
  const merged = [...map.values()].sort((a, b) => b.time - a.time);
  return merged.map(it => ({
    ...it,
    inIdb: idbIds.has(it.id),
    inFolder: folderIds.has(it.id),
    tag: it.src === 'both' ? 'synced' : (it.src === 'idb' ? 'local' : 'folder'),
  }));
}

// 取某条历史的图片：优先 IndexedDB，否则从文件夹读
async function getHistBlob(item) {
  if (item.inIdb) {
    const b = await idbGet('img:' + item.id);
    if (b) return b;
  }
  if (item.inFolder && await folderReady()) {
    return await folderReadBlob(item.file);
  }
  return null;
}

async function renderHistory() {
  const body = $('historyBody');
  const list = await mergedHistory();
  revokeHistUrls();
  if (!list.length) {
    body.innerHTML = '<div class="history-empty">暂无历史记录</div>';
    return;
  }
  const grid = document.createElement('div');
  grid.className = 'history-grid';
  for (const item of list) {
    const blob = await getHistBlob(item);
    if (!blob) continue;
    const url = URL.createObjectURL(blob);
    histUrls.push(url);
    const badgeText = { synced: '已同步', local: '仅缓存', folder: '仅文件夹' }[item.tag];
    const el = document.createElement('div');
    el.className = 'hist-item';
    el.innerHTML = `
      <img class="hist-img" src="${url}" title="点击在新标签打开">
      <div class="hist-meta">
        <span class="hist-mode">${item.mode === 'edit' ? '改图' : '文生图'}</span>
        <span class="hist-badge ${item.tag}">${badgeText}</span>
        <div class="hist-prompt">${escapeHtml(item.prompt || '')}</div>
        <div class="hist-time">${fmtTime(item.time)}</div>
      </div>
      <div class="hist-actions">
        <button class="btn ghost hist-reuse">改这张</button>
        <a class="btn ghost" href="${url}" download="${item.file}">下载</a>
        <button class="btn ghost hist-del">删除</button>
      </div>`;
    el.querySelector('.hist-img').onclick = () => window.open(url, '_blank');
    el.querySelector('.hist-reuse').onclick = () => reuseImage(url);
    el.querySelector('.hist-del').onclick = async () => {
      // 两边都删
      if (item.inIdb) {
        await idbDel('img:' + item.id);
        await saveIndex((await loadIndex()).filter(x => x.id !== item.id));
      }
      if (item.inFolder && await folderReady()) {
        try { await dirHandle.removeEntry(item.file); } catch {}
        await folderWriteIndex((await folderReadIndex()).filter(x => x.id !== item.id));
      }
      renderHistory();
    };
    grid.appendChild(el);
  }
  body.innerHTML = '';
  body.appendChild(grid);
}

// 同步到文件夹：已选中则把 IndexedDB 历史增量推过去；未选则先选一个（选完不自动同步）
async function pickFolder() {
  if (!FS_SUPPORTED) { setFolderStatus('当前浏览器不支持文件夹同步（需 Chrome / Edge）。历史已存在浏览器中，不影响使用。'); return; }
  try {
    if (dirHandle) {
      // 已有记住的文件夹：请求授权后执行同步（这是显式的同步操作）
      if (await ensurePermission(dirHandle, true)) {
        hideAuthBanner();
        await syncAllToFolder();
      }
      return;
    }
    // 尚未选文件夹：仅选择并记住，不自动同步
    dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    await idbSet('dirHandle', dirHandle);
    hideAuthBanner();
    setFolderStatus('已选择文件夹：' + dirHandle.name + '（点「同步到文件夹」可推送历史）');
    renderHistory();
  } catch (e) { /* 用户取消 */ }
}

// 更换文件夹：选一个新文件夹并记住，不自动同步
async function changeFolder() {
  if (!FS_SUPPORTED) { setFolderStatus('当前浏览器不支持文件夹同步（需 Chrome / Edge）。'); return; }
  try {
    dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    await idbSet('dirHandle', dirHandle);
    hideAuthBanner();
    setFolderStatus('已选择文件夹：' + dirHandle.name + '（点「同步到文件夹」可推送历史）');
    renderHistory();
  } catch (e) { /* 用户取消 */ }
}

// 把 IndexedDB 里现有历史全量增量同步到当前文件夹（文件夹已有的保留，缺的补齐）
async function syncAllToFolder() {
  setFolderStatus('正在同步到文件夹「' + dirHandle.name + '」…');
  const idbList = await loadIndex();
  const folderList = await folderReadIndex();
  const folderIds = new Set(folderList.map(x => x.id));
  let added = 0;
  // 把 IndexedDB 中文件夹缺失的条目写过去
  for (const item of idbList) {
    if (folderIds.has(item.id)) continue;
    const blob = await idbGet('img:' + item.id);
    if (blob) {
      try { await folderWrite(item.file, blob); folderList.push(item); added++; } catch {}
    }
  }
  // 合并后的索引按时间排序写回文件夹
  folderList.sort((a, b) => b.time - a.time);
  try { await folderWriteIndex(folderList); } catch {}
  setFolderStatus(`已同步到文件夹：${dirHandle.name}（新增 ${added} 条，之后新图自动写入）`);
  renderHistory();
}

async function restoreFolder() {
  if (!FS_SUPPORTED) { setFolderStatus(''); return; }
  try {
    const h = await idbGet('dirHandle');
    if (h) {
      dirHandle = h;
      const ok = await ensurePermission(h, false);
      if (ok) {
        hideAuthBanner();
        setFolderStatus('同步文件夹：' + h.name);
        if ($('historyPanel').style.display !== 'none') renderHistory();
      } else {
        // 已记住但未授权：显示醒目红色横幅，不在历史区里提示
        setFolderStatus('');
        showAuthBanner(h.name);
      }
    } else {
      hideAuthBanner();
    }
  } catch {}
}

// 红色横幅按钮：对已记住的文件夹请求授权
async function authFolder() {
  if (!dirHandle) return;
  if (await ensurePermission(dirHandle, true)) {
    hideAuthBanner();
    setFolderStatus('同步文件夹：' + dirHandle.name);
    renderHistory();
  }
}

$('pickFolder').onclick = pickFolder;
$('changeFolder').onclick = changeFolder;
$('authBtn').onclick = authFolder;
restoreFolder();

$('clearHistory').onclick = async () => {
  if (!confirm('确定清空所有历史记录？此操作不可恢复。')) return;
  const list = await loadIndex();
  for (const item of list) await idbDel('img:' + item.id);
  await saveIndex([]);
  if (dirHandle && await ensurePermission(dirHandle, true)) {
    for (const item of list) { try { await dirHandle.removeEntry(item.file); } catch {} }
    try { await folderWriteIndex([]); } catch {}
  }
  renderHistory();
};
</script>
